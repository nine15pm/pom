# S2S (Speech-to-Speech, Stage-2) full-run config.
# Assumption for this setup: /workspace is a persistent networked volume.
# accelerate launch --config_file configs/runpod_accelerate.yaml --module train.s2s_trainer --config configs/s2s.yaml

model:
  id: "Qwen/Qwen3-0.6B"
  cache: "/workspace/cache/hf"
  speech_encoder_id: "openai/whisper-large-v3"
  speech_encoder_cache: "/workspace/cache/whisper"
  frame_stack: 5
  adapter_hidden_dim: 2048
  speech_vocab_size: 6561

data:
  json_path: "/workspace/datasets/InstructS2S-200K/en/stage2"
  audio_root: "/workspace/datasets/InstructS2S-200K/en"
  shuffle_shards: true
  shuffle_seed: 42

training:
  # Global batch = batch_size * grad_accum * num_gpus should be 32 to match the paper recipe.
  batch_size: 2
  grad_accum: 16
  precision: "bf16"
  num_workers: 12
  dataloader_prefetch_factor: 2
  dataloader_persistent_workers: false
  dataloader_pin_memory: true
  dataloader_non_blocking: true
  seed: 42
  lr: 1.0e-3
  max_grad_norm: 10
  read_length: 3
  write_length: 10
  # Stage-2 uses 1 epoch in the paper.
  # Plain-English steps math:
  # - If Stage-2 has ~422,856 pair samples,
  # - and global batch is 32 samples per optimizer step,
  # - then one epoch is 422,856 / 32 = 13,214.25 steps.
  # - We round up so we do not under-train: steps = 13,215.
  steps: 13215
  warmup_ratio: 0.03
  thinker_checkpoint: "/workspace/outputs/pom/stage1a/checkpoints/final"
  tts_checkpoint: "/workspace/outputs/pom/stage1b/checkpoints/final"
  profile: false
  debug_sample_ids: false
  save_every: 3000
  keep_last_n_checkpoints: 6
  output_dir: "/workspace/outputs/pom/stage2"

wandb:
  enabled: true
  project: "pom"
  run_name: "s2s-1"
